<!doc"type" html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ESP32 WebSerial Terminal</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>

    <style>
      body {
        font-family: Arial;
        background: #111;
        color: #eee;
        margin: 0;
        padding: 10px;
      }

      #terminal {
        width: 100%;
        height: 400px;
        border: 1px solid #444;
      }

      button {
        margin-top: 10px;
        margin-right: 5px;
        padding: 8px 15px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <h3>ESP32 WebSerial Terminal</h3>

    <div id="terminal"></div>

    <button id="btnConnect">Conectar</button>
    <button id="btnDisconnect">Desconectar</button>
    <button id="btnReset">Reset ESP32</button>
    <button id="btnRunTest">print("Hola ESP32")</button>

    <script>
      const term = new Terminal({
        cursorBlink: true,
        cols: 80,
        rows: 24,
      });

      term.open(document.getElementById("terminal"));

      let port = null;
      let reader = null;
      let writer = null;

      let isConnected = false;

      const encoder = new TextEncoder();
      const decoder = new TextDecoder();

      let lastChars = "";

      //////////////////////////////////////////////////////////
      // CONECTAR
      //////////////////////////////////////////////////////////

      async function connectESP32() {
        try {
          port = await navigator.serial.requestPort();

          await port.open({
            baudRate: 115200,
            dataBits: 8,
            stopBits: 1,
            parity: "none",
            flowControl: "none",
          });

          writer = port.writable.getWriter();
          reader = port.readable.getReader();

          isConnected = true;

          term.writeln("\r\n✅ Conectado a ESP32\r\n");

          readLoop();
        } catch (error) {
          term.writeln("\r\n❌ Error: " + error + "\r\n");
        }
      }

      //////////////////////////////////////////////////////////
      // DESCONECTAR
      //////////////////////////////////////////////////////////

      async function disconnectESP32() {
        try {
          isConnected = false;

          if (reader) {
            await reader.cancel();
            reader.releaseLock();
            reader = null;
          }

          if (writer) {
            writer.releaseLock();
            writer = null;
          }

          if (port) {
            await port.close();
            port = null;
          }

          term.writeln("\r\n🔌 Desconectado\r\n");
        } catch (error) {
          term.writeln("\r\nError desconectando: " + error);
        }
      }

      //////////////////////////////////////////////////////////
      // LOOP DE LECTURA (RECIBE DATOS)
      //////////////////////////////////////////////////////////

      async function readLoop() {
        try {
          while (isConnected && port.readable) {
            const { value, done } = await reader.read();

            if (done) break;

            if (value) {
              const text = decoder.decode(value);

              // Mostrar inmediatamente (CLAVE)
              term.write(text);

              // Debug
              console.log("RX:", JSON.stringify(text));

              // Detectar prompt MicroPython
              lastChars += text;
              lastChars = lastChars.slice(-4);

              if (lastChars.includes(">>>")) {
                console.log("REPL listo");
              }
            }
          }
        } catch (error) {
          term.writeln("\r\n❌ Error lectura: " + error);
        }
      }

      //////////////////////////////////////////////////////////
      // ENVIAR DATOS
      //////////////////////////////////////////////////////////

      async function send(data) {
        if (!writer) return;

        await writer.write(encoder.encode(data));

        console.log("TX:", JSON.stringify(data));
      }

      //////////////////////////////////////////////////////////
      // TERMINAL INPUT (ENVÍA TECLAS)
      //////////////////////////////////////////////////////////

      term.onData(async (data) => {
        if (!isConnected) return;

        await send(data);
      });

      //////////////////////////////////////////////////////////
      // RESET ESP32
      //////////////////////////////////////////////////////////

      async function resetESP32() {
        if (!writer) return;

        term.writeln("\r\n🔄 Reset...\r\n");

        await send("\x03"); // Ctrl+C
        await sleep(100);

        await send("\x04"); // Ctrl+D
      }

      //////////////////////////////////////////////////////////
      // EJECUTAR TEST
      //////////////////////////////////////////////////////////

      async function runTest() {
        if (!writer) return;

        await send("\x03"); // Ctrl+C
        await sleep(100);

        await send('print("Hola ESP32")\r');
      }

      //////////////////////////////////////////////////////////
      // UTIL
      //////////////////////////////////////////////////////////

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      //////////////////////////////////////////////////////////
      // BOTONES
      //////////////////////////////////////////////////////////

      btnConnect.onclick = connectESP32;

      btnDisconnect.onclick = disconnectESP32;

      btnReset.onclick = resetESP32;

      btnRunTest.onclick = runTest;

      //////////////////////////////////////////////////////////
      // CTRL+C soporte desde teclado
      //////////////////////////////////////////////////////////

      document.addEventListener("keydown", async (e) => {
        if (e.ctrlKey && e.key === "c") {
          await send("\x03");
        }
      });

      //////////////////////////////////////////////////////////
      // MENSAJE INICIAL
      //////////////////////////////////////////////////////////

      term.writeln("ESP32 WebSerial Terminal");
      term.writeln("Haz clic en Conectar");
    </script>
  </body>
</html>
